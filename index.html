<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>F85</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#06060f;color:#e0e0f0;font-family:system-ui;padding:20px;max-width:420px;margin:0 auto;text-align:center}.b{padding:16px;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;width:100%;margin:8px 0;font-family:inherit}.g{background:#00dd88;color:#001a0e}.r{background:#ff3366;color:#fff}.bl{background:#0088ff;color:#fff}.gh{background:transparent;color:#888;border:1px solid #333}h1{font-size:24px;background:linear-gradient(90deg,#00d4ff,#00dd88);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:16px}</style></head><body><small style="letter-spacing:3px;color:#555;text-transform:uppercase">Sole Fitness</small><h1>F85</h1><button class="b r" id="cb" onclick="go()">Tryck for att ansluta Bluetooth</button><div id="log" style="font-size:11px;color:#666;margin:8px 0"></div><div id="spd" style="font-size:64px;font-weight:800;margin:16px 0">0.0</div><div style="color:#555;font-size:12px;margin-bottom:12px">km/h</div><div style="display:flex;gap:8px;margin:8px 0"><button class="b bl" onclick="adj(-0.5)">-0.5</button><button class="b bl" onclick="adj(0.5)">+0.5</button></div><div style="display:flex;gap:4px;flex-wrap:wrap;justify-content:center;margin:8px 0" id="qs"></div><div style="display:flex;gap:8px;margin:8px 0"><button class="b gh" onclick="inc(-1)">Lutning -</button><div id="incv" style="padding:14px;font-size:18px;font-weight:700">0%</div><button class="b gh" onclick="inc(1)">Lutning +</button></div><button class="b g" onclick="start()">STARTA</button><button class="b gh" onclick="stop()">STOPP</button><script>var s=0,t=0,cn=false,cp=null,hc=false,dv=null;function L(m){document.getElementById('log').innerHTML+=m+'<br>';}function U(){document.getElementById('spd').innerText=s.toFixed(1);document.getElementById('incv').innerText=t+'%';}var q=document.getElementById('qs');[3,5,7,8,10,12,14,16].forEach(function(v){var b=document.createElement('button');b.innerText=v;b.style.cssText='width:44px;height:36px;border-radius:8px;border:1px solid #333;background:#12122a;color:#888;font-size:14px;font-weight:700;cursor:pointer';b.onclick=function(){s=v;ss(v);U();};q.appendChild(b);});function adj(d){s=Math.round(Math.max(0,Math.min(20,s+d))*10)/10;ss(s);U();}function inc(d){t=Math.max(-6,Math.min(15,t+d));si(t);U();}async function ss(v){if(!cp||!hc)return;try{var b=new ArrayBuffer(3),d=new DataView(b);d.setUint8(0,2);d.setUint16(1,Math.round(v*100),true);await cp.writeValue(new Uint8Array(b));}catch(e){L('Err:'+e.message);}}async function si(v){if(!cp||!hc)return;try{var b=new ArrayBuffer(3),d=new DataView(b);d.setUint8(0,3);d.setInt16(1,Math.round(v*10),true);await cp.writeValue(new Uint8Array(b));}catch(e){L('Err:'+e.message);}}async function start(){if(!cp||!hc){L('Ej ansluten');return;}try{await cp.writeValue(new Uint8Array([7]));L('Startad');}catch(e){L('Err:'+e.message);}}async function stop(){if(!cp||!hc){L('Ej ansluten');return;}try{await cp.writeValue(new Uint8Array([8,1]));s=0;t=0;U();L('Stoppad');}catch(e){L('Err:'+e.message);}}async function go(){if(!navigator.bluetooth){L('Ingen Web Bluetooth');return;}L('Soker...');try{dv=await navigator.bluetooth.requestDevice({filters:[{services:[0x1826]}]});}catch(e){L('Avbruten: '+e.message);return;}L('Hittad: '+(dv.name||'?'));var b=document.getElementById('cb');b.innerText='Ansluter...';b.style.background='#ff8844';dv.addEventListener('gattserverdisconnected',function(){cn=false;cp=null;hc=false;b.innerText='Tryck for att ansluta';b.style.background='#ff3366';L('Fran kopplad');});try{var srv=await dv.gatt.connect();L('GATT OK');var svc;try{svc=await srv.getPrimaryService(0x1826);}catch(e){svc=await srv.getPrimaryService('00001826-0000-1000-8000-00805f9b34fb');}L('FTMS OK');try{cp=await svc.getCharacteristic(0x2AD9);await cp.startNotifications();L('Control OK');}catch(e){L('No control');cp=null;}try{var td=await svc.getCharacteristic(0x2ACD);await td.startNotifications();td.addEventListener('characteristicvaluechanged',function(ev){var d=new DataView(ev.target.value.buffer);var f=d.getUint16(0,true);s=d.getUint16(2,true)/100;U();});L('Data OK');}catch(e){L('No data');}if(cp){try{await cp.writeValue(new Uint8Array([0]));hc=true;L('Kontroll OK');}catch(e){L('No ctrl');}}cn=true;b.innerText='Ansluten: '+(dv.name||'F85');b.style.background='#00dd88';b.style.color='#001a0e';L('KLAR!');}catch(e){L('FEL: '+e.message);b.innerText='Tryck for att ansluta';b.style.background='#ff3366';}}</script></body></html>
