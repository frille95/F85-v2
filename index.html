<!DOCTYPE html>

<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>F85 Controller</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#06060f;color:#e0e0f0;font-family:-apple-system,system-ui,sans-serif;padding:16px;max-width:420px;margin:0 auto}
.hdr{text-align:center;margin-bottom:14px}
.hdr small{font-size:10px;letter-spacing:3px;color:#555570;text-transform:uppercase;display:block;margin-bottom:2px}
.hdr h1{font-size:26px;font-weight:800;background:linear-gradient(90deg,#00d4ff,#00dd88);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.cbox{width:100%;padding:14px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:12px;text-align:center;border:1px solid #331133;background:#1a1020;color:#ff3366}
.tabs{display:flex;gap:3px;background:#0d0d1c;border-radius:12px;padding:3px;margin-bottom:14px}
.tabs button{flex:1;padding:10px 0;border:none;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;background:transparent;color:#555570;font-family:inherit}
.tabs button.on{background:#1e1e3a;color:#fff}
.big{text-align:center;font-size:56px;font-weight:800;margin:10px 0 2px;line-height:1}
.big.live{color:#00dd88}
.unit{text-align:center;font-size:11px;color:#555570;margin-bottom:8px}
.tgt{text-align:center;font-size:13px;color:#0088ff;margin-bottom:8px}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:10px 0}
.st{background:linear-gradient(135deg,#12122a,#1a1a35);border-radius:12px;padding:10px 6px;text-align:center}
.st small{display:block;font-size:9px;color:#555570;text-transform:uppercase;letter-spacing:2px;margin-bottom:3px}
.st b{font-size:16px;font-weight:700}
.row{display:flex;gap:8px;margin:8px 0}
.btn{flex:1;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center}
.btn:active{opacity:0.8}
.blu{background:linear-gradient(135deg,#0055bb,#0077ee);color:#fff}
.grn{background:linear-gradient(135deg,#009960,#00dd88);color:#001a0e}
.red{background:linear-gradient(135deg,#bb2244,#ff3366);color:#fff}
.gho{background:transparent;color:#8888aa;border:1px solid #1e1e3a}
.qs{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin:8px 0}
.qs button{width:46px;height:38px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;background:#12122a;color:#8888aa;border:1px solid #1e1e3a;font-family:inherit}
.qs button.on{border-color:#00d4ff;color:#00d4ff;background:rgba(0,212,255,0.08)}
.warn{background:#1a1010;border:1px solid #442222;border-radius:10px;padding:10px 12px;margin:8px 0;font-size:11px;color:#cc8888;line-height:1.5}
.warn b{color:#ff3366}
.err{background:#1a0a0a;border:1px solid #662222;border-radius:10px;padding:10px 12px;margin:8px 0;font-size:12px;color:#ff8888}
.dlog{background:#080810;border:1px solid #1a1a2a;border-radius:8px;padding:8px;margin:6px 0;font-size:10px;color:#666680;max-height:100px;overflow-y:auto}
.ibar{display:flex;height:26px;border-radius:8px;overflow:hidden;background:#0a0a15;margin:8px 0}
.pcard{background:linear-gradient(135deg,#12122a,#1a1a35);border-radius:14px;padding:14px;margin-bottom:10px}
.pcard h3{font-size:14px;font-weight:700;margin-bottom:8px}
.ptags{display:flex;gap:4px;flex-wrap:wrap;margin:6px 0}
.ptag{font-size:9px;padding:3px 6px;border-radius:6px;display:inline-block}
.estep{background:linear-gradient(135deg,#12122a,#1a1a35);border-radius:12px;padding:12px;margin-bottom:8px}
.einp{width:100%;background:#0a0a18;border:1px solid #1e1e3a;border-radius:8px;padding:8px;color:#e0e0f0;font-size:13px;margin-bottom:6px;font-family:inherit}
.eab{width:32px;height:32px;border-radius:6px;background:#1e1e3a;border:none;color:#8888aa;font-size:16px;cursor:pointer}
</style>
</head>
<body>
<div class="hdr"><small>Sole Fitness</small><h1>F85</h1></div>
<button class="cbox" id="cb">&#9679; Tryck f&#246;r att ansluta Bluetooth</button>
<div id="errbox"></div>
<div id="logbox"></div>
<div class="tabs">
<button class="on" id="tab0" onclick="switchTab(0)">K&#246;r</button>
<button id="tab1" onclick="switchTab(1)">Program</button>
<button id="tab2" onclick="switchTab(2)">Skapa</button>
</div>
<div id="main"></div>
<script>
var ts=0,ti=0,sp=0,li=0,el=0,ds=0,run=false,im=false,ap=null,ci=0,con=false,ctrl=null,tdc=null,dev=null,hc=false,vtab=0,tmr=null,htmr=null,logs=[];
var myProg=[{s:5,d:300,l:'Uppv\u00e4rmning'},{s:10,d:60,l:'Intervall'},{s:5,d:120,l:'Vila'},{s:10,d:60,l:'Intervall'},{s:4,d:180,l:'Nedvarvning'}];
var editProg=[];
var presets=[
{n:'Nyb\u00f6rjarintervall',ic:'\uD83D\uDFE2',iv:[{s:5,d:300,l:'Uppv\u00e4rmning'},{s:8,d:60,l:'Intervall'},{s:5,d:120,l:'Vila'},{s:8,d:60,l:'Intervall'},{s:5,d:120,l:'Vila'},{s:8,d:60,l:'Intervall'},{s:5,d:120,l:'Vila'},{s:8,d:60,l:'Intervall'},{s:4,d:300,l:'Nedvarvning'}]},
{n:'HIIT 4x4',ic:'\uD83D\uDD34',iv:[{s:6,d:600,l:'Uppv\u00e4rmning'},{s:12,d:240,l:'Intervall 1'},{s:5,d:180,l:'Vila'},{s:12,d:240,l:'Intervall 2'},{s:5,d:180,l:'Vila'},{s:12,d:240,l:'Intervall 3'},{s:5,d:180,l:'Vila'},{s:12,d:240,l:'Intervall 4'},{s:4,d:300,l:'Nedvarvning'}]},
{n:'Pyramidpass',ic:'\uD83D\uDFE1',iv:[{s:5,d:300,l:'Uppv\u00e4rmning'},{s:8,d:60,l:'Steg 1'},{s:5,d:60,l:'Vila'},{s:9,d:90,l:'Steg 2'},{s:5,d:60,l:'Vila'},{s:10,d:120,l:'Topp'},{s:5,d:60,l:'Vila'},{s:9,d:90,l:'Steg 4'},{s:5,d:60,l:'Vila'},{s:8,d:60,l:'Steg 5'},{s:4,d:300,l:'Nedvarvning'}]}
];
function log(m){logs.push(m);if(logs.length>6)logs.shift();var lb=document.getElementById('logbox');if(lb)lb.innerHTML='<div class="dlog">'+logs.join('<br>')+'</div>';}
function fmt(sec){var m=Math.floor(sec/60);var s=sec%60;return(m<10?'0':'')+m+':'+(s<10?'0':'')+s;}
function pace(k){if(!k)return'--:--';var p=60/k;var m=Math.floor(p);var s=Math.round((p-m)*60);return m+':'+(s<10?'0':'')+s;}
function clamp(v){return Math.round(Math.max(0,Math.min(20,v))*10)/10;}

document.getElementById(‘cb’).addEventListener(‘click’,function(){
if(con){if(dev&&dev.gatt&&dev.gatt.connected)dev.gatt.disconnect();con=false;ctrl=null;tdc=null;hc=false;updBtn();return;}
startBLE();
});

function updBtn(){var b=document.getElementById(‘cb’);if(con){b.innerHTML=’\u25CF Ansluten till ‘+(dev&&dev.name?dev.name:‘F85’);b.style.background=’#0a1a10’;b.style.color=’#00dd88’;b.style.borderColor=’#113322’;}else{b.innerHTML=’\u25CF Tryck f\u00f6r att ansluta Bluetooth’;b.style.background=’#1a1020’;b.style.color=’#ff3366’;b.style.borderColor=’#331133’;}}

async function startBLE(){
if(!navigator.bluetooth){document.getElementById(‘errbox’).innerHTML=’<div class="err">Web Bluetooth st\u00f6ds inte i denna webbl\u00e4sare.</div>’;return;}
document.getElementById(‘errbox’).innerHTML=’’;
log(’\u00d6ppnar Bluetooth-s\u00f6kning…’);
try{dev=await navigator.bluetooth.requestDevice({acceptAllDevices:true,optionalServices:[0x1826]});}catch(e){log(‘Avbruten: ‘+e.message);return;}
log(‘Vald: ‘+(dev.name||’?’));
var b=document.getElementById(‘cb’);b.innerHTML=’\u23F3 Ansluter…’;b.style.background=’#1a1a20’;b.style.color=’#ff8844’;
dev.addEventListener(‘gattserverdisconnected’,function(){con=false;ctrl=null;tdc=null;hc=false;updBtn();log(‘Fr\u00e5nkopplad’);});
try{
log(‘Ansluter GATT…’);var srv=await dev.gatt.connect();
log(‘S\u00f6ker FTMS…’);var svc=null;
try{svc=await srv.getPrimaryService(0x1826);}catch(e){try{svc=await srv.getPrimaryService(‘00001826-0000-1000-8000-00805f9b34fb’);}catch(e2){throw new Error(‘FTMS saknas’);}}
log(‘FTMS hittad!’);
try{ctrl=await svc.getCharacteristic(0x2AD9);await ctrl.startNotifications();log(‘Control Point \u2713’);}catch(e){log(‘Control Point saknas’);ctrl=null;}
try{tdc=await svc.getCharacteristic(0x2ACD);await tdc.startNotifications();tdc.addEventListener(‘characteristicvaluechanged’,onTD);log(‘Treadmill Data \u2713’);}catch(e){log(‘Treadmill Data saknas’);}
if(ctrl){try{await ctrl.writeValue(new Uint8Array([0x00]));hc=true;log(‘Kontroll beviljad \u2713’);}catch(e){log(‘Kontrollbeg\u00e4ran nekad’);}}
con=true;updBtn();log(‘Klar!’);document.getElementById(‘errbox’).innerHTML=’’;
}catch(e){log(‘FEL: ‘+e.message);document.getElementById(‘errbox’).innerHTML=’<div class="err">’+e.message+’</div>’;con=false;updBtn();}}

function onTD(ev){var d=new DataView(ev.target.value.buffer);var o=0;var f=d.getUint16(o,true);o+=2;sp=d.getUint16(o,true)/100;o+=2;if(f&2)o+=2;if(f&4)o+=3;if(f&8){li=d.getInt16(o,true)/10;o+=4;}draw();}

async function sendSpd(v){if(!ctrl||!hc)return;try{var buf=new ArrayBuffer(3);var dv=new DataView(buf);dv.setUint8(0,0x02);dv.setUint16(1,Math.round(v*100),true);await ctrl.writeValue(new Uint8Array(buf));}catch(e){log(’Fart-fel: ’+e.message);}}
async function sendInc(v){if(!ctrl||!hc)return;try{var buf=new ArrayBuffer(3);var dv=new DataView(buf);dv.setUint8(0,0x03);dv.setInt16(1,Math.round(v*10),true);await ctrl.writeValue(new Uint8Array(buf));}catch(e){log(’Lutning-fel: ’+e.message);}}
async function sendStart(){if(!ctrl||!hc)return;try{await ctrl.writeValue(new Uint8Array([0x07]));}catch(e){}}
async function sendStop(p){if(!ctrl||!hc)return;try{await ctrl.writeValue(new Uint8Array([0x08,p?2:1]));}catch(e){}}

function setSpd(v){ts=clamp(v);sendSpd(ts);draw();}
function adjSpd(d){setSpd(ts+d);}
function setInc(v){ti=Math.max(-6,Math.min(15,Math.round(v)));sendInc(ti);draw();}
function doStart(){if(ts===0)ts=5;run=true;el=0;ds=0;sendStart();sendSpd(ts);sendInc(ti);tmr=setInterval(function(){el++;ds+=ts/3600;if(im&&ap)updI();draw();},1000);draw();}
function doPause(){run=false;sendStop(true);clearInterval(tmr);draw();}
function doStop(){run=false;im=false;ap=null;ci=0;ts=0;ti=0;sendStop(false);clearInterval(tmr);draw();}
function doResume(){run=true;sendStart();sendSpd(ts);tmr=setInterval(function(){el++;ds+=ts/3600;if(im&&ap)updI();draw();},1000);draw();}
function doReset(){el=0;ds=0;ts=0;ti=0;im=false;ap=null;ci=0;draw();}
function updI(){var tb=0;for(var i=0;i<ap.length;i++){if(el<tb+ap[i].d){if(i!==ci){ci=i;setSpd(ap[i].s);}return;}tb+=ap[i].d;}doStop();}
function startProg(iv){ap=iv;im=true;ci=0;ts=iv[0].s;ti=0;switchTab(0);doStart();}
function holdStart(fn){fn();htmr=setInterval(fn,250);}
function holdEnd(){clearInterval(htmr);}

function switchTab(n){vtab=n;for(var i=0;i<3;i++){document.getElementById(‘tab’+i).className=(i===n)?‘on’:’’;};draw();}

function makeBar(iv,aIdx,elapsed){
var tot=0;for(var i=0;i<iv.length;i++)tot+=iv[i].d;
var h=’<div class="ibar">’;
for(var i=0;i<iv.length;i++){
var w=(iv[i].d/tot*100);var isA=(i===aIdx);var isD=(i<aIdx);var isW=(iv[i].s>=7);
var bg=isW?’#1a3355’:’#1a2a1a’;if(isD)bg=isW?’#004488’:’#006633’;if(isA)bg=isW?’#0088ff’:’#00cc66’;
var fill=’’;if(isA&&elapsed!==undefined){var eb=0;for(var j=0;j<i;j++)eb+=iv[j].d;var pct=Math.min(((elapsed-eb)/iv[i].d)*100,100);fill=’<div style="position:absolute;left:0;top:0;bottom:0;width:'+pct+'%;background:'+bg+';transition:width .5s linear"></div>’;}
var lbl=’’;if(w>6){var col=(isA||isD)?’#fff’:’#444’;var fw=isA?‘700’:‘400’;lbl=’<span style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9px;color:'+col+';font-weight:'+fw+';z-index:1">’+iv[i].s+’</span>’;}
var segBg=(isD||!isA)?bg:’#1a2a1a’;
h+=’<div style="position:relative;min-width:3px;width:'+w+'%;border-right:1px solid #06060f;background:'+segBg+'">’+fill+lbl+’</div>’;}
h+=’</div>’;return h;}

function draw(){var m=document.getElementById(‘main’);if(!m)return;if(vtab===0)m.innerHTML=drawRun();else if(vtab===1)m.innerHTML=drawProg();else m.innerHTML=drawEdit();}

function drawRun(){
var dsp=con?sp:ts;var dinc=con?li:ti;var h=’’;
h+=’<div class="big'+(con?' live':'')+'">’+dsp.toFixed(1)+’</div>’;
h+=’<div class="unit">km/h \u00b7 Tempo: ‘+pace(dsp)+’ min/km</div>’;
if(run&&ts!==dsp)h+=’<div class="tgt">M\u00e5l \u2192 ‘+ts.toFixed(1)+’ km/h</div>’;
if(im&&ap){var cur=ap[ci];var eb=0;for(var j=0;j<ci;j++)eb+=ap[j].d;var tl=Math.max(0,cur.d-(el-eb));
h+=makeBar(ap,ci,el);h+=’<div style="display:flex;justify-content:space-between;font-size:11px;color:#8888aa;margin:4px 0"><span>’+cur.l+’</span><span>’+fmt(tl)+’ kvar</span></div>’;}
h+=’<div class="stats"><div class="st"><small>Tid</small><b>’+fmt(el)+’</b></div><div class="st"><small>Distans</small><b>’+ds.toFixed(2)+’ km</b></div><div class="st"><small>Lutning</small><b>’+dinc+’%</b></div></div>’;
if(!con)h+=’<div class="warn"><b>\u26A0 Ej ansluten.</b> Anslut via Bluetooth ovan f\u00f6r att styra l\u00f6pbandet.</div>’;
h+=’<div class="row"><button class="btn blu" onpointerdown="holdStart(function(){adjSpd(-0.5)})" onpointerup="holdEnd()" onpointerleave="holdEnd()">\u25BC 0.5</button><button class="btn blu" onpointerdown="holdStart(function(){adjSpd(0.5)})" onpointerup="holdEnd()" onpointerleave="holdEnd()">\u25B2 0.5</button></div>’;
h+=’<div class="qs">’;var spds=[3,5,7,8,10,12,14,16];for(var i=0;i<spds.length;i++){h+=’<button class="'+(ts===spds[i]?'on':'')+'" onclick="setSpd('+spds[i]+')">’+spds[i]+’</button>’;}h+=’</div>’;
h+=’<div class="row"><button class="btn gho" onclick="setInc(ti-1)">\u26F0 \u2212</button><div style="font-size:18px;font-weight:700;min-width:50px;text-align:center;padding:10px;flex:0.5">’+ti+’%</div><button class="btn gho" onclick="setInc(ti+1)">\u26F0 +</button></div>’;
h+=’<div class="row">’;
if(!run){if(el>0){h+=’<button class="btn grn" onclick="doResume()">\u25B6 FORTS\u00C4TT</button><button class="btn gho" onclick="doReset()">\u23F9 NOLLST\u00C4LL</button>’;}else{h+=’<button class="btn grn" onclick="doStart()">\u25B6 STARTA</button>’;}}
else{h+=’<button class="btn red" onclick="doPause()">\u23F8 PAUSA</button><button class="btn gho" style="flex:0.5" onclick="doStop()">\u23F9 STOPP</button>’;}
h+=’</div>’;
if(con)h+=’<div class="warn"><b>\u26A0</b> Ha s\u00e4kerhetskl\u00e4mman f\u00e4st. N\u00f6dstopp fungerar alltid.</div>’;
return h;}

function drawProg(){
var h=’<div style="font-size:13px;color:#8888aa;margin-bottom:8px">F\u00e4rdiga program</div>’;
for(var pi=0;pi<presets.length;pi++){var p=presets[pi];var tot=0;for(var j=0;j<p.iv.length;j++)tot+=p.iv[j].d;
h+=’<div class="pcard"><h3>’+p.ic+’ ‘+p.n+’ <span style="float:right;font-size:12px;color:#555570;font-weight:400">’+fmt(tot)+’</span></h3>’;
h+=makeBar(p.iv,-1,0);h+=’<div class="ptags">’;
for(var j=0;j<p.iv.length;j++){var x=p.iv[j];var cls=x.s>=7?‘background:rgba(0,136,255,0.12);color:#4499dd’:‘background:rgba(0,204,102,0.08);color:#44aa66’;h+=’<span class="ptag" style="'+cls+'">’+x.l+’ ‘+x.s+‘km/h</span>’;}
h+=’</div><button class="btn grn" style="width:100%;margin-top:8px" onclick="startProg(presets['+pi+'].iv)">\u25B6 K\u00f6r program</button></div>’;}
h+=’<div style="border-top:1px solid #1e1e3a;padding-top:12px;margin-top:8px"><div style="font-size:13px;color:#8888aa;margin-bottom:8px">Eget program</div>’;
h+=’<div class="pcard"><h3>\u26A1 Mitt intervallpass</h3>’+makeBar(myProg,-1,0)+’<div class="ptags">’;
for(var j=0;j<myProg.length;j++){var x=myProg[j];var cls=x.s>=7?‘background:rgba(0,136,255,0.12);color:#4499dd’:‘background:rgba(0,204,102,0.08);color:#44aa66’;h+=’<span class="ptag" style="'+cls+'">’+x.l+’ ‘+x.s+‘km/h</span>’;}
h+=’</div><div class="row" style="margin-top:8px"><button class="btn grn" onclick="startProg(myProg.slice())">\u25B6 K\u00f6r</button><button class="btn gho" onclick="editProg=JSON.parse(JSON.stringify(myProg));switchTab(2)">\u270F Redigera</button></div></div></div>’;
return h;}

function drawEdit(){
var h=’<div style="font-size:13px;color:#8888aa;margin-bottom:8px">Skapa intervallpass</div>’;
for(var i=0;i<editProg.length;i++){var x=editProg[i];
h+=’<div class="estep"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span style="font-size:12px;font-weight:700;color:#8888aa">Steg ‘+(i+1)+’</span><button style="background:none;border:none;color:#ff3366;font-size:18px;cursor:pointer;padding:2px 8px" onclick="editProg.splice('+i+',1);draw()">\u00d7</button></div>’;
h+=’<input class="einp" value="'+x.l+'" onchange="editProg['+i+'].l=this.value">’;
h+=’<div style="display:flex;gap:8px"><div style="flex:1"><div style="font-size:9px;color:#555570;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Fart</div><div style="display:flex;align-items:center;gap:4px"><button class="eab" onclick="editProg['+i+'].s=Math.max(1,editProg['+i+'].s-0.5);draw()">\u2212</button><div style="flex:1;text-align:center;font-size:16px;font-weight:700;color:'+(x.s>=7?'#0088ff':'#00dd88')+'">’+x.s+’</div><button class="eab" onclick="editProg['+i+'].s=Math.min(20,editProg['+i+'].s+0.5);draw()">+</button></div></div>’;
h+=’<div style="flex:1"><div style="font-size:9px;color:#555570;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Tid</div><div style="display:flex;align-items:center;gap:4px"><button class="eab" onclick="editProg['+i+'].d=Math.max(10,editProg['+i+'].d-30);draw()">\u2212</button><div style="flex:1;text-align:center;font-size:16px;font-weight:700">’+fmt(x.d)+’</div><button class="eab" onclick="editProg['+i+'].d=Math.min(3600,editProg['+i+'].d+30);draw()">+</button></div></div></div></div>’;}
h+=’<button class="btn gho" style="width:100%;margin:8px 0" onclick="editProg.push({s:8,d:60,l:\'Steg \'+(editProg.length+1)});draw()">+ L\u00e4gg till steg</button>’;
if(editProg.length>0){h+=makeBar(editProg,-1,0);var tot=0;for(var i=0;i<editProg.length;i++)tot+=editProg[i].d;h+=’<div style="text-align:center;font-size:11px;color:#555570;margin:6px 0">Totalt: ‘+fmt(tot)+’</div>’;}
h+=’<button class=“btn grn” style=“width:100%;margin-top:8px’+(editProg.length===0?’;opacity:0.3’:’’)+’”’+(editProg.length===0?’ disabled’:’’)+’ onclick=“myProg=JSON.parse(JSON.stringify(editProg));switchTab(1)”>\u2713 Spara program</button>’;
return h;}

try{draw();}catch(e){document.getElementById(‘main’).innerHTML=’<div class="err">Fel: ‘+e.message+’</div>’;}
</script>

</body>
</html>
